<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>成員管理 · 華雄音樂匯</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#f5f4f0;min-height:100vh;color:#1a1a1a;}
.app{max-width:560px;margin:0 auto;padding:1.5rem 1rem 5rem;}
.header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #e0ddd5;}
.header-icon{width:44px;height:44px;border-radius:10px;background:#fce7f3;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.header-title{font-size:18px;font-weight:600;line-height:1.3;}
.header-sub{font-size:13px;color:#888;margin-top:2px;}
.form-card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.form-title{font-size:15px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-group label{font-size:12px;color:#666;font-weight:500;}
.form-group input{font-size:14px;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-family:inherit;background:#fff;outline:none;transition:border .15s;}
.form-group input:focus{border-color:#3b82f6;}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.btn{padding:8px 20px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #d1d5db;background:#f9fafb;color:#1a1a1a;transition:all .15s;font-family:inherit;}
.btn:hover{background:#f3f4f6;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb;}
.btn-primary:hover{background:#1d4ed8;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-danger{background:#fef2f2;color:#dc2626;border-color:#fca5a5;}
.btn-danger:hover{background:#fee2e2;}
.member-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0ede6;}
.member-row:last-child{border-bottom:none;}
.member-name{font-size:14px;font-weight:500;}
.member-status{font-size:11px;padding:2px 8px;border-radius:99px;margin-left:8px;}
.status-on{background:#dcfce7;color:#166534;}
.status-off{background:#f1f5f9;color:#64748b;}
.member-actions{display:flex;gap:6px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
.overlay-card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.overlay-title{font-size:18px;font-weight:600;margin-bottom:.4rem;}
.overlay-sub{font-size:13px;color:#888;margin-bottom:1.5rem;}
.empty-state{text-align:center;padding:2rem;color:#888;font-size:13px;}
</style>
</head>
<body>
<div class="app" id="app" style="display:none;">

  <div class="header">
    <div class="header-icon">🔒</div>
    <div style="flex:1;min-width:0;">
      <div class="header-title">成員管理</div>
      <div class="header-sub">華雄音樂匯 · 午餐儲值系統</div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-title">➕ 新增成員</div>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="new-name" placeholder="輸入姓名"/>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="add-btn" onclick="addMember()">新增</button>
    </div>
  </div>

  <div class="form-card">
    <div class="form-title">👥 目前成員</div>
    <div id="member-list"></div>
  </div>

</div>

<!-- 密碼輸入畫面 -->
<div class="overlay" id="login-overlay">
  <div class="overlay-card">
    <div class="overlay-title">🔒 管理密碼</div>
    <div class="overlay-sub">請輸入密碼以進入成員管理頁面</div>
    <div class="form-group">
      <input type="password" id="pw-input" placeholder="密碼" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" style="width:100%;" onclick="login()">進入</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let API_URL = localStorage.getItem('lunch_api_url') || '';
let PASSWORD = '';

// admin 頁面自己的 API_URL 設定（沿用跟 index.html 一樣的 key，避免要設定兩次）
if (!API_URL) {
  API_URL = prompt('請輸入 GAS API 網址（跟主系統設定的一樣）：') || '';
  if (API_URL) localStorage.setItem('lunch_api_url', API_URL);
}

async function api(params) {
  if (!API_URL) return null;
  const p = { ...params, t: Date.now() };
  const r = await fetch(API_URL + '?' + new URLSearchParams(p));
  const text = await r.text();
  try { return JSON.parse(text); } catch (e) { return null; }
}

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#1a1a1a' : '#dc2626';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function login() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) { toast('請輸入密碼', false); return; }

  // 用一次無害的 setStatus 呼叫測試密碼是否正確（帶一個不存在的姓名，
  // 密碼錯會回「密碼錯誤」；密碼對但姓名不存在會回「找不到該成員」— 兩者都能判斷密碼對不對）
  const res = await api({ action: 'updateMembers', password: pw, op: 'setStatus', name: '__pwcheck__', status: '啟用' });

  if (res && res.msg === '密碼錯誤') {
    toast('密碼錯誤', false);
    return;
  }
  if (!res) {
    toast('無法連線到伺服器，請確認 API 網址', false);
    return;
  }

  PASSWORD = pw;
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadMembers();
}

async function loadMembers() {
  const res = await api({ action: 'getMembers' });
  const list = document.getElementById('member-list');

  if (!res || !res.ok) {
    list.innerHTML = '<div class="empty-state">讀取失敗，請確認 API 網址是否正確</div>';
    return;
  }

  const members = res.members || [];
  if (!members.length) {
    list.innerHTML = '<div class="empty-state">目前沒有成員</div>';
    return;
  }

  list.innerHTML = members.map(m => `
    <div class="member-row">
      <div>
        <span class="member-name">${m.name}</span>
        <span class="member-status ${m.active ? 'status-on' : 'status-off'}">${m.active ? '啟用' : '停用'}</span>
      </div>
      <div class="member-actions">
        <button class="btn btn-sm" onclick="toggleStatus('${m.name}', ${m.active})">${m.active ? '停用' : '啟用'}</button>
      </div>
    </div>
  `).join('');
}

async function addMember() {
  const input = document.getElementById('new-name');
  const name = input.value.trim();
  if (!name) { toast('請輸入姓名', false); return; }

  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  const res = await api({ action: 'updateMembers', password: PASSWORD, op: 'add', name });
  btn.disabled = false;

  if (res && res.ok) {
    toast(`✓ 已新增 ${name}`);
    input.value = '';
    loadMembers();
  } else {
    toast(res?.msg || '新增失敗', false);
  }
}

async function toggleStatus(name, currentlyActive) {
  const newStatus = currentlyActive ? '停用' : '啟用';
  const res = await api({ action: 'updateMembers', password: PASSWORD, op: 'setStatus', name, status: newStatus });

  if (res && res.ok) {
    toast(`✓ ${name} 已設為${newStatus}`);
    loadMembers();
  } else {
    toast(res?.msg || '更新失敗', false);
  }
}
</script>
</body>
</html>
